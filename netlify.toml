# Netlify build config for this Next.js (App Router) app.
# This is a server-rendered app — API routes (/api/rsvp, /api/admin, /api/calendar)
# and server components need the Next.js runtime, provided by the plugin below.
# NOTE: any Base/Build/Publish/Functions overrides set in the Netlify dashboard
# take precedence over this file — clear them so these values are used.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # These are not secrets (public project URL, sender address, site URL), so
  # exclude them from Netlify's secret scanner. The real secrets
  # (SUPABASE_SERVICE_ROLE_KEY, RESEND_API_KEY, ADMIN_*, DATABASE_URL) are still scanned.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,RESEND_FROM,SITE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
